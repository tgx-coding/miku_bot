version: "3.8"

services:
  web:
    image: ghcr.io/tgx-coding/miku_bot:latest
    network_mode: host
    restart: always
    command: uvicorn QQ_Bot:app --host 0.0.0.0 --port 8080
    volumes:
      - ./logs:/app/logs
    ports:
      - '8080:8080'
    environment:
      - TZ=Asia/Shanghai
      - MY_BOT_QQ=
      - DEVELOPING_NUMBER= 
      - DEEP_SEEK_API_KEY=
      - QWEN_API_KEY=
      - SILICONFLOW_API_KEY=
      - DAW_API_KEY=
      - NAPCAT_API=http://localhost:3000/



